[pytest]
# importlib mode lets us reuse the basenames test_q1.py..test_q4.py across
# hw1..hw4/tests without collection collisions.
# psets/hw*/tests are student-facing scaffolds that raise NotImplementedError
# until students fill the starters — exclude from default runs; grade them
# explicitly via `pytest onboarding/projects/psets/hwN`.
addopts = --import-mode=importlib
pythonpath = ../..
